name: UK Farm Blog Daily Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Daily at 6 AM UTC (pre-dawn UK time)
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate Daily Brief
        run: |
          python3 scripts/fetch-rss.py || true
          python3 scripts/generate-daily-brief.py --output content/posts || true
      
      - name: Build Site
        run: python3 scripts/build-site.py
      
      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
